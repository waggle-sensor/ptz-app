name: "ptzapp"
namespace: "waggle"
description: "Intelligent Pan–Tilt–Zoom camera app with YOLO/Florence detection and PlantNet species ID (fork with enhancements)."
version: "0.2.0"
authors: "Saumya Pailwan <spailwan@anl.gov>; Dario Dematties <ddematties@anl.gov>; Peter Lebiedzinski <piotr.lebiedzinski@northwestern.edu>"
collaborators: "The Sage Team"
funding: "NSF 1935984, DOE"
license: "Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International License"
keywords: "camera, ptz, pan, tilt, zoom, yolo, florence, plantnet, waggle"
homepage: "https://github.com/saumya-pailwan/PTZ_APP.git"
source:
  architectures:
    - "linux/amd64"
    - "linux/arm64"
  url: "https://github.com/saumya-pailwan/PTZ_APP.git"   
  branch: "feature/plantnet-species"

inputs:
  - id: "iterations"   ; type: "int"
  - id: "objects"      ; type: "string"
  - id: "username"     ; type: "string"
  - id: "password"     ; type: "string"
  - id: "cameraip"     ; type: "string"
  - id: "panstep"      ; type: "int"
  - id: "tilt"         ; type: "int"
  - id: "zoom"         ; type: "int"
  - id: "model"        ; type: "string"
  - id: "iterdelay"    ; type: "float"
  - id: "confidence"   ; type: "float"
  - id: "keepimages"   ; type: "boolean"
  - id: "debug"        ; type: "boolean"
  - id: "prompt_prefix"; type: "string"
  - id: "species_zoom" ; type: "int"
